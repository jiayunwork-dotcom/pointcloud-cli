input:
  - test_cloud.xyz

pipeline:
  - step: filter
    params:
      type: statistical
      k: 20
      std_ratio: 1.5

  - step: downsample
    params:
      type: voxel
      voxel_size: 0.1

  - step: normals
    params:
      k: 15

  - step: reconstruct
    params:
      type: poisson
      depth: 6

output: result.obj

output_intermediate: true
output_dir: ./output
report_path: report.json
